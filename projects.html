<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Celine SiuHam Zhang</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#050b14',
                        'deep-blue': '#0a192f',
                        'neon-blue': '#00ffff',
                        'neon-purple': '#bd00ff',
                        'neon-green': '#39ff14',
                        'neon-red': '#ff003c',
                        'neon-pink': '#ff00ff',
                        slate: '#8892b0',
                        white: '#e6f1ff',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                        display: ['Chakra Petch', 'sans-serif'],
                        cyber: ['Orbitron', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'slide-in': 'slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        slideIn: {
                            '0%': { transform: 'translateY(50px)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --neon-blue: #00ffff;
            --neon-purple: #bd00ff;
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --neon-pink: #ff00ff;
        }

        body {
            background-color: #050b14;
            color: #8892b0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Grid Background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            pointer-events: none;
        }

        /* Banner Background Gradient Layer */
        .banner-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px; /* Even shorter */
            pointer-events: none;
            z-index: 40;
            background: linear-gradient(to left, rgba(5, 11, 20, 0.95) 0%, rgba(5, 11, 20, 0.8) 40%, rgba(5, 11, 20, 0) 100%);
        }

        /* Navigation (Same as About Me) */
        .nav-box {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: rgba(5, 11, 20, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
        }

        .nav-box:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .nav-box.active {
            background: white;
            color: #050b14;
            border-color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* Language Toggle (Same as About Me) */
        .lang-switch {
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: white;
            padding: 8px 12px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            background: transparent;
            transition: all 0.3s;
            font-weight: bold;
        }
        .lang-switch:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }

        .lang-zh { display: none; }
        body.zh-mode .lang-en { display: none; }
        body.zh-mode .lang-zh { display: block; }

        /* Neon Glow Title (replaces glitch) */
        .neon-title {
            color: #ffffff;
            text-shadow:
                0 0 10px rgba(0, 255, 255, 0.55),
                0 0 22px rgba(0, 255, 255, 0.28),
                0 0 38px rgba(189, 0, 255, 0.22);
        }

        /* Projects Grid Container - Positioned right below banner */
        .projects-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 110px);
            margin-top: 110px;
            overflow: hidden;
        }

        /* 4x2 Grid */
        .projects-slider {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            grid-template-rows: repeat(2, minmax(0, 1fr));
            height: 100%;
            width: 100%;
            padding: 1.25rem 2rem 1.5rem;
            gap: 1.25rem;
            align-items: stretch;
            justify-items: stretch;
        }

        /* Square Project Card */
        .project-card {
            width: 100%;
            height: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), filter 0.35s ease;
            cursor: pointer;
            perspective: 1000px;
            transform-style: preserve-3d;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.2));
            overflow: hidden;
            border-radius: 16px;
        }

        /* Card hover effect */
        .project-card:hover {
            transform: scale(1.02) translateZ(8px);
            z-index: 50;
            filter: drop-shadow(0 0 26px currentColor);
        }

        /* Card Image - Fill the entire decorative frame */
        .card-image-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Fill the entire frame, cropping if necessary */
            filter: brightness(1.1) contrast(1.15) saturate(1.1);
            transition: all 0.5s ease;
        }

        .project-card:hover .card-image {
            filter: brightness(1.25) contrast(1.25) saturate(1.15);
            transform: scale(1.05);
        }

        /* Keep Zhuguang cover close to original tone */
        .project-card[href*="zhuguang"] .card-image {
            filter: none;
        }
        .project-card[href*="zhuguang"]:hover .card-image {
            filter: none;
            transform: scale(1.05);
        }
        .project-card[href*="zhuguang"] .tech-frame {
            color: #6f9f9a;
        }
        .project-card[href*="zhuguang"]:hover .tech-frame {
            color: #7eafa8;
        }
        .project-card[href*="zhuguang"] .game-name,
        .project-card[href*="zhuguang"]:hover .game-name {
            color: #b9d3cf !important;
            text-shadow:
                0 0 8px rgba(126, 175, 168, 0.45),
                0 0 16px rgba(126, 175, 168, 0.28),
                0 0 24px rgba(126, 175, 168, 0.18) !important;
        }
        .project-card[href*="zhuguang"] .tech-frame::after {
            box-shadow: 0 0 18px rgba(111, 159, 154, 0.75), inset 0 0 12px rgba(111, 159, 154, 0.62) !important;
        }
        .project-card[href*="zhuguang"]:hover .tech-frame::after {
            box-shadow: 0 0 26px rgba(126, 175, 168, 0.86), inset 0 0 16px rgba(126, 175, 168, 0.72) !important;
        }

        /* Lynn Project Styles */
        .project-card[href*="lynn"] .card-image {
            filter: none;
        }
        .project-card[href*="lynn"]:hover .card-image {
            filter: none;
            transform: scale(1.05);
        }
        .project-card[href*="lynn"] .tech-frame {
            color: #ffb7b2; /* Joy Pink */
        }
        .project-card[href*="lynn"]:hover .tech-frame {
            color: #ffdac1; /* Joy Orange on hover */
        }
        .project-card[href*="lynn"] .game-name,
        .project-card[href*="lynn"]:hover .game-name {
            color: #ffb7b2 !important;
            text-shadow:
                0 0 8px rgba(255, 183, 178, 0.45),
                0 0 16px rgba(255, 183, 178, 0.28),
                0 0 24px rgba(255, 183, 178, 0.18) !important;
        }
        .project-card[href*="lynn"] .tech-frame::after {
            box-shadow: 0 0 18px rgba(255, 183, 178, 0.75), inset 0 0 12px rgba(255, 183, 178, 0.62) !important;
        }
        .project-card[href*="lynn"]:hover .tech-frame::after {
            box-shadow: 0 0 26px rgba(255, 218, 193, 0.86), inset 0 0 16px rgba(255, 218, 193, 0.72) !important;
        }

        /* Sushi Go card: remove overexposed highlight effects */
        .project-card[href*="SushiGo"] {
            filter: none;
        }
        .project-card[href*="SushiGo"]:hover {
            filter: none;
        }
        .project-card[href*="SushiGo"] .card-image {
            filter: none;
        }
        .project-card[href*="SushiGo"]:hover .card-image {
            filter: none;
            transform: scale(1.05);
        }

        /* Moderator card: red accent, no overexposure */
        .project-card[href*="moderator"] {
            filter: none;
        }
        .project-card[href*="moderator"]:hover {
            filter: none;
        }
        .project-card[href*="moderator"] .card-image {
            filter: none;
        }
        .project-card[href*="moderator"]:hover .card-image {
            filter: none;
            transform: scale(1.05);
        }
        .project-card[href*="moderator"] .tech-frame {
            color: #dc2626;
        }
        .project-card[href*="moderator"]:hover .tech-frame {
            color: #f87171;
        }
        .project-card[href*="moderator"] .game-name,
        .project-card[href*="moderator"]:hover .game-name {
            color: #fff !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5), 0 0 12px rgba(0, 0, 0, 0.4) !important;
        }
        .project-card[href*="moderator"] .tech-frame::after {
            box-shadow: 0 0 18px rgba(220, 38, 38, 0.7), inset 0 0 12px rgba(220, 38, 38, 0.5) !important;
        }
        .project-card[href*="moderator"]:hover .tech-frame::after {
            box-shadow: 0 0 26px rgba(248, 113, 113, 0.8), inset 0 0 16px rgba(248, 113, 113, 0.6) !important;
        }

        /* One Inch Away card style */
        .project-card[href*="one-inches-away"] {
            filter: none;
        }
        .project-card[href*="one-inches-away"]:hover {
            filter: drop-shadow(0 0 26px rgba(253, 253, 150, 0.45));
        }
        .project-card[href*="one-inches-away"] .card-image {
            filter: none;
        }
        .project-card[href*="one-inches-away"]:hover .card-image {
            filter: none;
            transform: scale(1.05);
        }
        .project-card[href*="one-inches-away"] .tech-frame {
            color: #f5c26b;
        }
        .project-card[href*="one-inches-away"]:hover .tech-frame {
            color: #f9d87a;
        }
        .project-card[href*="one-inches-away"] .game-name,
        .project-card[href*="one-inches-away"]:hover .game-name {
            color: #fffbe6 !important;
            text-shadow:
                0 0 8px rgba(245, 194, 107, 0.4),
                0 0 16px rgba(245, 194, 107, 0.25),
                0 0 24px rgba(245, 194, 107, 0.18) !important;
        }

        /* Keep Five Elemental Clash card non-neon */
        .project-card[href*="five-elemental-clash"] {
            filter: none;
        }
        .project-card[href*="five-elemental-clash"]:hover {
            filter: none;
        }
        .project-card[href*="five-elemental-clash"] .card-image {
            filter: none;
        }
        .project-card[href*="five-elemental-clash"]:hover .card-image {
            filter: none;
            transform: scale(1.05);
        }
        .project-card[href*="five-elemental-clash"] .tech-frame {
            color: #b7a27a;
        }
        .project-card[href*="five-elemental-clash"]:hover .tech-frame {
            color: #c3af88;
        }
        .project-card[href*="five-elemental-clash"] .game-name,
        .project-card[href*="five-elemental-clash"]:hover .game-name {
            text-shadow:
                0 0 10px rgba(195, 175, 136, 0.65),
                0 0 20px rgba(195, 175, 136, 0.45),
                0 0 30px rgba(195, 175, 136, 0.28) !important;
            color: #c3af88 !important;
        }
        .project-card[href*="five-elemental-clash"] .tech-frame::before,
        .project-card[href*="five-elemental-clash"] .tech-frame::after,
        .project-card[href*="five-elemental-clash"]:hover .tech-frame::before,
        .project-card[href*="five-elemental-clash"]:hover .tech-frame::after {
            filter: none !important;
        }
        .project-card[href*="five-elemental-clash"] .tech-frame::after {
            box-shadow: 0 0 20px rgba(183, 162, 122, 0.85), inset 0 0 15px rgba(183, 162, 122, 0.75) !important;
        }
        .project-card[href*="five-elemental-clash"]:hover .tech-frame::after {
            box-shadow: 0 0 30px rgba(195, 175, 136, 0.95), inset 0 0 20px rgba(195, 175, 136, 0.85) !important;
        }

        /* For placeholder cards without images */
        .placeholder-bg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(10, 25, 47, 0.8) 0%, rgba(5, 11, 20, 0.9) 100%);
        }

        /* Game Name - Black label block at bottom-left */
        .game-name {
            position: absolute;
            bottom: 0.75rem;
            left: 0;
            z-index: 30;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 800;
            font-size: 0.98rem;
            color: #fff !important;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.12;
            text-shadow: none !important;
            transition: transform 0.25s ease;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.96) 0%, rgba(0, 0, 0, 0.88) 100%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-left: 0;
            border-radius: 0 10px 10px 0;
            padding: 0.46rem 0.65rem 0.42rem;
            max-width: 76%;
            box-sizing: border-box;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
        }
        .game-name::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: rgba(255, 255, 255, 0.3);
        }
        .game-name span {
            white-space: normal;
            word-break: break-word;
        }
        .game-name .lang-zh { display: none; }
        body.zh-mode .game-name .lang-en { display: none; }
        body.zh-mode .game-name .lang-zh { display: inline; }
        .game-name.long-title {
            font-size: 0.82rem;
            line-height: 1.08;
            letter-spacing: 0.04em;
            max-width: 82%;
        }
        .corner-badge {
            position: absolute;
            top: 0.6rem;
            right: 0;
            z-index: 32;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.92) 0%, rgba(0, 0, 0, 0.82) 100%);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-right: 0;
            border-radius: 10px 0 0 10px;
            padding: 0.3rem 0.55rem 0.28rem;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.32);
            pointer-events: none;
        }
        .corner-badge::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            width: 3px;
            background: rgba(255, 255, 255, 0.3);
        }

        /* Red role badge under the black badge */
        .role-badge {
            top: 2.15rem;
            background: linear-gradient(90deg, rgba(15, 23, 42, 0.96) 0%, rgba(30, 58, 138, 0.9) 100%);
            border-color: rgba(255, 255, 255, 0.20);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.28), 0 0 18px rgba(59, 130, 246, 0.14);
            font-size: 0.62rem;
            letter-spacing: 0.1em;
        }
        .role-badge::before {
            background: rgba(255, 255, 255, 0.38);
        }

        /* Hover effects for different projects */
        .project-card:hover .game-name {
            transform: translateY(-1px);
        }

        /* Specific color shadows for each project */
        .project-card[href*="vere"] .game-name {
            color: white;
        }
        .project-card[href*="vere"]:hover .game-name {
            text-shadow:
                0 0 10px var(--neon-purple),
                0 0 20px var(--neon-purple),
                0 0 30px var(--neon-purple);
        }

        .project-card[href*="wonder"] .game-name {
            color: white;
        }
        .project-card[href*="wonder"]:hover .game-name {
            text-shadow:
                0 0 10px var(--neon-red),
                0 0 20px var(--neon-red),
                0 0 30px var(--neon-red);
        }

        /* Tech Frame */
        .tech-frame {
            position: absolute;
            inset: -10px;
            pointer-events: none;
            z-index: 25;
            transition: all 0.4s ease;
        }

        .tech-frame::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 2px solid;
            opacity: 0.6;
            border-radius: 8px;
            filter: blur(1px);
            transition: all 0.4s ease;
        }

        .tech-frame::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid;
            border-radius: 12px;
            opacity: 0.9;
            box-shadow: 0 0 20px currentColor, inset 0 0 15px currentColor;
            filter: drop-shadow(0 0 8px currentColor);
            transition: all 0.4s ease;
        }

        .project-card:hover .tech-frame::before {
            border-width: 3px;
            opacity: 0.8;
            filter: blur(0.5px);
        }

        .project-card:hover .tech-frame::after {
            border-width: 3px;
            box-shadow: 0 0 30px currentColor, inset 0 0 20px currentColor;
            filter: drop-shadow(0 0 15px currentColor);
        }

        /* Frame Colors */
        .frame-vere { color: var(--neon-purple); }
        .frame-wonder { color: var(--neon-red); }
        .frame-default { color: var(--neon-blue); }
        .frame-cyber { color: var(--neon-green); }
        .frame-starlight { color: var(--neon-pink); }

        /* Hide slider controls in grid mode */
        .slider-nav {
            display: none;
        }

        /* Hide slider dots in grid mode */
        .slider-dots {
            display: none;
        }

        .slider-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .slider-dot.active {
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff;
            transform: scale(1.2);
        }

        .slider-dot:hover {
            background: rgba(0, 255, 255, 0.6);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .projects-container {
                height: calc(100vh - 96px);
                margin-top: 96px;
            }
            .projects-slider {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                grid-template-rows: repeat(4, minmax(0, 1fr));
                padding: 0.9rem 1rem 1rem;
                gap: 0.9rem;
            }
        }

        @media (max-width: 768px) {
            .game-name {
                bottom: 1rem;
                left: 0;
                font-size: 0.82rem;
                max-width: 84%;
            }

            .project-card:hover .game-name {
                transform: translateY(-1px);
            }

            .projects-container {
                height: calc(100vh - 76px);
                margin-top: 76px;
            }
        }

        @media (max-width: 480px) {
            .projects-slider {
                padding: 0.7rem;
                gap: 0.7rem;
            }

            .game-name {
                font-size: 0.74rem;
            }

            .project-card:hover .game-name {
                transform: none;
            }

            /* Adjust header for mobile */
            .fixed.top-0.left-0.w-full.p-8 {
                padding: 1rem;
            }

            .fixed.top-0.left-0.w-full.p-8 h1 {
                font-size: 2.5rem;
            }

            .flex.gap-4.pointer-events-auto.items-center.z-50 {
                top: 1rem;
                right: 1rem;
            }

            .nav-box, .lang-switch {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }

            .projects-container {
                height: calc(100vh - 60px);
                margin-top: 60px;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">
    <!-- Grid Background -->
    <div class="grid-bg"></div>

    <!-- Banner Background Gradient Layer -->
    <div class="banner-bg"></div>

    <!-- Header Content with Adjusted Button Position (Same as About Me) -->
    <div class="fixed top-0 left-0 w-full p-8 z-50 flex justify-between items-start pointer-events-none">
        <!-- Left: Project Title with Glitch Effect -->
        <div class="pointer-events-auto z-50">
            <h1 class="neon-title font-cyber font-black text-5xl md:text-7xl leading-tight tracking-tighter mb-2 pl-4">
                PROJECT
            </h1>
        </div>

        <!-- Right: Navigation - Positioned like index.html -->
        <div class="flex gap-4 pointer-events-auto items-center z-50" style="position: absolute; top: 2rem; right: 2rem;">
            <a href="index.html" class="nav-box"><span class="lang-en">Home</span><span class="lang-zh">首页</span></a>
            <a href="projects.html" class="nav-box active"><span class="lang-en">Project</span><span class="lang-zh">项目</span></a>
            <a href="contact.html" class="nav-box"><span class="lang-en">About me</span><span class="lang-zh">关于我</span></a>

            <button onclick="toggleLang()" class="lang-switch ml-4">
                <span class="lang-en">中文</span><span class="lang-zh">EN</span>
            </button>
        </div>
    </div>

    <!-- Projects Slider -->
    <div class="projects-container">
        <!-- Projects Slider -->
        <div class="projects-slider" id="projectsSlider">
            <!-- 1. Moderator -->
            <a href="moderator.html" class="project-card">
                <div class="corner-badge">Demo</div>
                <div class="corner-badge role-badge">SOLO</div>

        lucide.createIcons();

        function applySavedLang() {
            const isZh = localStorage.getItem('siteLang') === 'zh';
            document.body.classList.toggle('zh-mode', isZh);
            document.documentElement.lang = isZh ? 'zh' : 'en';

            // Route to correct language version for pages with two HTML files
            const fec = document.querySelector('a.project-card[href="five-elemental-clash.html"]');
            if (fec) fec.href = isZh ? 'five-elemental-clash.html' : 'five-elemental-clash-en.html';
        }

        function toggleLang() {
            const isZh = !document.body.classList.contains('zh-mode');
            document.body.classList.toggle('zh-mode', isZh);
            document.documentElement.lang = isZh ? 'zh' : 'en';
            localStorage.setItem('siteLang', isZh ? 'zh' : 'en');
        }

        applySavedLang();
