<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="50%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    
    <!-- Sky gradient for accents -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BB1E8"/>
      <stop offset="100%" style="stop-color:#7ecfff"/>
    </linearGradient>
    
    <!-- Milk bottle gradient -->
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e8f4fc"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#5BB1E8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgGrad)"/>
  
  <!-- Background grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="600" y2="100" stroke="#5BB1E8" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="600" y2="200" stroke="#5BB1E8" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="600" y2="300" stroke="#5BB1E8" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="600" y2="400" stroke="#5BB1E8" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="600" y2="500" stroke="#5BB1E8" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="600" stroke="#5BB1E8" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#5BB1E8" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#5BB1E8" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#5BB1E8" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="#5BB1E8" stroke-width="0.5"/>
  </g>
  
  <!-- Corner decorations -->
  <g stroke="#5BB1E8" stroke-width="2" fill="none" opacity="0.4">
    <path d="M20 50 L20 20 L50 20"/>
    <path d="M550 20 L580 20 L580 50"/>
    <path d="M580 550 L580 580 L550 580"/>
    <path d="M50 580 L20 580 L20 550"/>
  </g>
  
  <!-- HUD lines -->
  <line x1="0" y1="150" x2="600" y2="150" stroke="#5BB1E8" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="450" x2="600" y2="450" stroke="#5BB1E8" stroke-width="0.5" opacity="0.2"/>
  <line x1="150" y1="0" x2="150" y2="600" stroke="#5BB1E8" stroke-width="0.5" opacity="0.2"/>
  <line x1="450" y1="0" x2="450" y2="600" stroke="#5BB1E8" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Main milk bottle -->
  <g filter="url(#shadow)" transform="translate(150, 100)">
    <!-- Bottle cap -->
    <rect x="90" y="0" width="120" height="40" rx="6" fill="url(#skyGrad)"/>
    <rect x="95" y="8" width="110" height="10" rx="3" fill="#7ecfff" opacity="0.5"/>
    
    <!-- Bottle body -->
    <path d="M100 40 L100 80 L50 140 L50 380 C50 420 100 440 150 440 C200 440 250 420 250 380 L250 140 L200 80 L200 40 Z" 
          fill="url(#bottleGrad)" stroke="#5BB1E8" stroke-width="3"/>
    
    <!-- Milk inside -->
    <path d="M58 150 L58 375 C58 405 100 420 150 420 C200 420 242 405 242 375 L242 150 Z" fill="#E8F4FC"/>
    
    <!-- Milk waves -->
    <path d="M58 180 Q90 170 150 180 Q210 190 242 180" stroke="#5BB1E8" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M58 210 Q90 200 150 210 Q210 220 242 210" stroke="#5BB1E8" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M58 240 Q90 230 150 240 Q210 250 242 240" stroke="#5BB1E8" stroke-width="2" fill="none" opacity="0.2"/>
    
    <!-- Label -->
    <rect x="75" y="280" width="150" height="90" rx="5" fill="#5BB1E8" opacity="0.1" stroke="#5BB1E8" stroke-width="1"/>
    <text x="150" y="315" text-anchor="middle" font-family="Chakra Petch, sans-serif" font-size="28" font-weight="700" fill="#5BB1E8">MILK</text>
    <text x="150" y="350" text-anchor="middle" font-family="Chakra Petch, sans-serif" font-size="18" fill="#5BB1E8" opacity="0.7">100%</text>
    
    <!-- Shine effect -->
    <ellipse cx="85" cy="200" rx="15" ry="50" fill="white" opacity="0.4"/>
    
    <!-- Bubbles -->
    <circle cx="210" cy="200" r="8" fill="#7ecfff" opacity="0.3"/>
    <circle cx="200" cy="250" r="5" fill="#7ecfff" opacity="0.2"/>
    <circle cx="215" cy="290" r="6" fill="#7ecfff" opacity="0.25"/>
  </g>
  
  <!-- Title -->
  <g filter="url(#glow)">
    <text x="300" y="530" text-anchor="middle" font-family="Chakra Petch, sans-serif" font-size="52" font-weight="700" fill="#0f172a" letter-spacing="-1">
      Milk Man
    </text>
    <text x="300" y="575" text-anchor="middle" font-family="Chakra Petch, sans-serif" font-size="42" font-weight="600" fill="#5BB1E8" letter-spacing="2">
      Crushing
    </text>
  </g>
  
  <!-- Decorative elements -->
  <!-- Star 1 -->
  <g transform="translate(80, 80)">
    <polygon points="15,0 19,11 30,11 21,18 24,30 15,22 6,30 9,18 0,11 11,11" fill="#FFE066"/>
  </g>
  
  <!-- Star 2 -->
  <g transform="translate(500, 120) scale(0.7)">
    <polygon points="15,0 19,11 30,11 21,18 24,30 15,22 6,30 9,18 0,11 11,11" fill="#FF8FA3"/>
  </g>
  
  <!-- Star 3 -->
  <g transform="translate(480, 450) scale(0.5)">
    <polygon points="15,0 19,11 30,11 21,18 24,30 15,22 6,30 9,18 0,11 11,11" fill="#7DD3C0"/>
  </g>
  
  <!-- Heart -->
  <path d="M70 420 C70 410 80 400 90 400 C100 400 110 410 110 420 C110 435 90 455 90 455 C90 455 70 435 70 420 Z" fill="#FF8FA3" opacity="0.7"/>
  
  <!-- Meta tag -->
  <g transform="translate(400, 70)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="#5BB1E8"/>
    <text x="60" y="20" text-anchor="middle" font-family="Fira Code, monospace" font-size="11" font-weight="500" fill="white" letter-spacing="1">PARTY GAME</text>
  </g>
</svg>
